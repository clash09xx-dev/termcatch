<path d="M 333 411 L 346 411 L 346 469 L 333 469" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round"/>

<rect x="20" y="490" width="900" height="105" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<text x="40" y="515" font-family="Arial" font-size="12" fill="#6b7280">E. Haczyk z kropka na koncu — zlapany slot jako sufiks</text>
