<text x="40" y="55" font-family="Arial" font-size="12" fill="#6b7280">A. Litera h przechodzi w haczyk — akcent wbudowany w napis</text>
<text x="40" y="112" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#9ca3af">term</text>
<text x="160" y="112" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#111827">catch</text>
