<text x="40" y="285" font-family="Arial" font-size="12" fill="#6b7280">C. Zakreslacz — catch podswietlone jak zaznaczony slot w kalendarzu</text>
<text x="40" y="342" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#9ca3af">term</text>
<rect x="154" y="296" width="156" height="58" rx="10" fill="#e5e7eb"/>
<text x="160" y="342" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#111827">catch</text>

<rect x="20" y="375" width="900" height="105" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<text x="40" y="400" font-family="Arial" font-size="12" fill="#6b7280">D. Nawiasy slotu — [catch] jak wolne okienko w grafiku</text>
<text x="40" y="457" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#9ca3af">term</text>
