<text x="40" y="170" font-family="Arial" font-size="12" fill="#6b7280">B. Podkreslenie konczace sie ptaszkiem — nie fala, tylko odhaczenie</text>
<text x="40" y="227" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#9ca3af">term</text>
<text x="160" y="227" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#111827">catch</text>
